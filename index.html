<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kódování na prázdniny - Přesné RWD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <span class="hlavicka-text hide-m hide-t">Hlavička</span>
        <div class="header-inner">
            <div class="logo">Logo</div>
            
            <div class="header-right">
                <div class="search-bar hide-m hide-t">
                    <input type="text" placeholder="Navigace" disabled>
                    <button class="search-btn">🔍</button>
                </div>
                <div class="burger hide-d">☰</div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="grid-container">
            <div class="box yellow">Box 1</div>
            <div class="box yellow">Box 2</div>
            <div class="box yellow box-y3">Box 3</div>
            <div class="box yellow">Box 4</div>

            <div class="box orange hide-m hide-t">Box 1</div> <div class="box orange hide-t">Box 2</div>       <div class="box orange hide-t">Box 3</div>       <div class="box orange hide-t hide-d">Box 4</div> <div class="box red dot hide-m">Box 1</div>       <div class="box red dot hide-m">Box 2</div>       <div class="box red dot hide-t hide-d">Box 3</div> <div class="box red dot hide-t hide-d">Box 4</div> <aside class="sidebar">Sidebar</aside>
        </div>
    </main>

    <footer class="footer">
        <span class="paticka-text hide-m hide-t">Patička</span>
        <div class="footer-inner">
            <div class="footer-grid">
                <div class="box purple hide-m">Box 1</div> <div class="box purple hide-m">Box 2</div> <div class="box purple">Box 3</div>        </div>
        </div>
    </footer>

</body>
</html>
